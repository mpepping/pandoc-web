<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pandoc Web — Markdown to PDF</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <script>
      // Apply theme before first paint to avoid flash.
      (function () {
        try {
          var saved = localStorage.getItem("pw-theme");
          var prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;
          var theme = saved || (prefersDark ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>

    <style>
      :root {
        /* Paper (light) */
        --paper: #f3eddd;
        --paper-2: #ebe4cf;
        --paper-3: #ddd4ba;
        --rule: #c2b89a;
        --rule-soft: #d6cdb1;
        --ink: #1c1812;
        --ink-2: #4a4338;
        --ink-3: #7c7361;
        --ink-4: #a39a83;
        --accent: #c1432a;
        --accent-2: #9d3623;
        --success: #2e6e4d;
        --error: #a83b2a;

        --grain-opacity: 0.05;
        --shadow-paper:
          0 1px 2px rgba(40, 30, 20, 0.06),
          0 12px 28px rgba(40, 30, 20, 0.07);
        --shadow-press:
          0 1px 0 rgba(255, 255, 255, 0.35),
          0 2px 0 rgba(20, 14, 8, 0.18);
      }

      :root[data-theme="dark"] {
        --paper: #16120d;
        --paper-2: #1f1a13;
        --paper-3: #2a241b;
        --rule: #3a3224;
        --rule-soft: #2b2418;
        --ink: #ece4cf;
        --ink-2: #b8ad92;
        --ink-3: #847a64;
        --ink-4: #5c5546;
        --accent: #e85a3c;
        --accent-2: #c1432a;
        --success: #6cb594;
        --error: #e85a3c;

        --grain-opacity: 0.08;
        --shadow-paper:
          0 1px 2px rgba(0, 0, 0, 0.45),
          0 16px 36px rgba(0, 0, 0, 0.42);
        --shadow-press:
          0 1px 0 rgba(255, 255, 255, 0.04),
          0 2px 0 rgba(0, 0, 0, 0.32);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        background: var(--paper);
        color: var(--ink);
        font-family: "DM Sans", system-ui, sans-serif;
        font-size: 15px;
        line-height: 1.5;
        letter-spacing: -0.005em;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Paper grain overlay */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 999;
        opacity: var(--grain-opacity);
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.65'/></svg>");
        mix-blend-mode: multiply;
      }

      .app {
        max-width: 1380px;
        margin: 0 auto;
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: 18px;
        padding: 30px 34px 26px;
        position: relative;
      }

      /* ── Header ─────────────────────────────────────── */
      .app-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--rule);
        position: relative;
      }
      .app-header::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -4px;
        height: 1px;
        background: var(--rule);
        opacity: 0.35;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .brand-mark {
        width: 30px;
        height: 36px;
        color: var(--ink);
        flex-shrink: 0;
      }
      .brand-name {
        font-family: "Fraunces", serif;
        font-weight: 500;
        font-size: 30px;
        letter-spacing: -0.025em;
        margin: 0;
        color: var(--ink);
        line-height: 1;
      }
      .brand-name em {
        font-style: italic;
        color: var(--accent);
        font-weight: 400;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 18px;
      }
      .header-meta {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 10.5px;
        font-weight: 600;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--ink-3);
      }
      .header-meta .sep {
        width: 4px;
        height: 4px;
        background: var(--accent);
        border-radius: 50%;
        display: inline-block;
      }

      .theme-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        padding: 0;
        background: var(--paper-2);
        border: 1px solid var(--rule);
        border-radius: 50%;
        cursor: pointer;
        color: var(--ink-2);
        transition:
          background 0.15s ease,
          color 0.15s ease,
          border-color 0.15s ease,
          transform 0.2s ease;
      }
      .theme-toggle:hover {
        color: var(--accent);
        border-color: var(--ink-3);
        background: var(--paper);
      }
      .theme-toggle:active {
        transform: scale(0.94);
      }
      .theme-toggle:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
      .theme-toggle svg {
        width: 16px;
        height: 16px;
        stroke-width: 1.8;
      }
      .theme-toggle .icon-moon {
        display: none;
      }
      :root[data-theme="dark"] .theme-toggle .icon-sun {
        display: none;
      }
      :root[data-theme="dark"] .theme-toggle .icon-moon {
        display: block;
      }

      /* ── Toolbar ────────────────────────────────────── */
      .toolbar {
        display: flex;
        gap: 28px;
        align-items: flex-end;
        flex-wrap: wrap;
      }
      .control {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .control-label {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--ink-3);
      }
      .control.toolbar-end {
        margin-left: auto;
      }

      .segmented {
        display: inline-flex;
        background: var(--paper-2);
        border: 1px solid var(--rule);
        border-radius: 7px;
        padding: 3px;
      }
      .segmented button {
        background: transparent;
        border: none;
        padding: 6px 14px;
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        font-weight: 500;
        color: var(--ink-2);
        cursor: pointer;
        border-radius: 4px;
        letter-spacing: -0.005em;
        transition:
          color 0.15s ease,
          background 0.15s ease,
          box-shadow 0.15s ease;
      }
      .segmented button:hover {
        color: var(--ink);
      }
      .segmented button.is-active {
        background: var(--paper);
        color: var(--ink);
        box-shadow:
          0 1px 0 rgba(0, 0, 0, 0.04),
          0 0 0 1px var(--rule-soft);
      }
      .segmented button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      /* ── Workspace ──────────────────────────────────── */
      .workspace {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
        min-height: 520px;
      }
      .workspace[data-view="editor"] {
        grid-template-columns: 1fr;
      }
      .workspace[data-view="editor"] .preview-pane {
        display: none;
      }
      .workspace[data-view="preview"] {
        grid-template-columns: 1fr;
      }
      .workspace[data-view="preview"] .editor-pane {
        display: none;
      }

      .pane {
        background: var(--paper);
        border: 1px solid var(--rule);
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
        box-shadow: var(--shadow-paper);
      }

      .pane-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 11px 18px;
        border-bottom: 1px solid var(--rule-soft);
        background: linear-gradient(
          to bottom,
          var(--paper-2),
          var(--paper) 80%
        );
        flex-shrink: 0;
      }
      .pane-label {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--ink-3);
      }
      .pane-stats {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--ink-3);
        display: flex;
        gap: 10px;
        align-items: center;
        font-variant-numeric: tabular-nums;
      }
      .pane-stats .stat-dot {
        width: 3px;
        height: 3px;
        background: var(--ink-4);
        border-radius: 50%;
      }

      /* Editor */
      .editor-pane.is-drag-over {
        border-color: var(--accent);
        border-style: dashed;
      }
      .editor-pane.is-drag-over .editor-body {
        background: rgba(193, 67, 42, 0.05);
      }

      .editor-body {
        position: relative;
        flex: 1;
        display: flex;
        min-height: 0;
      }
      #markdown {
        flex: 1;
        width: 100%;
        padding: 24px 28px;
        border: none;
        background: transparent;
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        line-height: 1.65;
        color: var(--ink);
        resize: none;
        outline: none;
        caret-color: var(--accent);
        tab-size: 2;
      }
      #markdown::selection {
        background: rgba(193, 67, 42, 0.18);
      }

      /* Empty state */
      .empty-state {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 40px;
        pointer-events: none;
        background: var(--paper);
        transition:
          opacity 0.18s ease,
          visibility 0s linear 0.18s;
      }
      .empty-state.is-hidden {
        opacity: 0;
        visibility: hidden;
      }
      .empty-state-icon {
        color: var(--ink-4);
        width: 44px;
        height: 44px;
      }
      .empty-state-title {
        font-family: "Fraunces", serif;
        font-weight: 400;
        font-style: italic;
        font-size: 26px;
        letter-spacing: -0.015em;
        color: var(--ink-2);
        margin: 0;
        line-height: 1.1;
      }
      .empty-state-subtitle {
        font-size: 13px;
        color: var(--ink-3);
        max-width: 320px;
        text-align: center;
        margin: -6px 0 6px;
      }
      .empty-actions {
        display: flex;
        gap: 8px;
        pointer-events: auto;
      }

      /* Preview */
      .preview-content {
        flex: 1;
        overflow-y: auto;
        padding: 30px 38px 40px;
        color: var(--ink);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        line-height: 1.65;
      }
      .preview-content > *:first-child {
        margin-top: 0;
      }
      .preview-content h1,
      .preview-content h2,
      .preview-content h3,
      .preview-content h4 {
        font-family: "Fraunces", serif;
        font-weight: 500;
        letter-spacing: -0.022em;
        color: var(--ink);
        line-height: 1.2;
      }
      .preview-content h1 {
        font-size: 32px;
        margin: 0 0 18px;
      }
      .preview-content h2 {
        font-size: 22px;
        margin: 30px 0 12px;
        padding-top: 14px;
        border-top: 1px solid var(--rule-soft);
      }
      .preview-content h3 {
        font-size: 17px;
        margin: 22px 0 10px;
      }
      .preview-content p {
        margin: 0 0 14px;
        color: var(--ink-2);
      }
      .preview-content a {
        color: var(--accent);
        text-decoration: underline;
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
      }
      .preview-content code {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.88em;
        background: var(--paper-2);
        padding: 1px 6px;
        border-radius: 4px;
        color: var(--accent-2);
      }
      .preview-content pre {
        background: var(--paper-2);
        border: 1px solid var(--rule-soft);
        border-radius: 6px;
        padding: 14px 16px;
        overflow-x: auto;
        font-size: 12.5px;
        line-height: 1.55;
        margin: 0 0 16px;
      }
      .preview-content pre code {
        background: transparent;
        padding: 0;
        color: var(--ink);
      }
      .preview-content ul,
      .preview-content ol {
        padding-left: 22px;
        color: var(--ink-2);
        margin: 0 0 14px;
      }
      .preview-content li {
        margin: 4px 0;
      }
      .preview-content blockquote {
        border-left: 3px solid var(--accent);
        padding: 4px 0 4px 18px;
        margin: 16px 0;
        color: var(--ink-2);
        font-family: "Fraunces", serif;
        font-style: italic;
        font-size: 16.5px;
      }
      .preview-content hr {
        border: none;
        border-top: 1px solid var(--rule);
        margin: 28px 0;
      }
      .preview-content table {
        border-collapse: collapse;
        width: 100%;
        margin: 16px 0;
        font-size: 13px;
      }
      .preview-content th,
      .preview-content td {
        border: 1px solid var(--rule-soft);
        padding: 8px 12px;
        text-align: left;
      }
      .preview-content th {
        background: var(--paper-2);
        font-weight: 600;
      }
      .preview-content img {
        max-width: 100%;
        height: auto;
        border-radius: 4px;
      }
      .preview-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: 4px;
        color: var(--ink-4);
        font-family: "Fraunces", serif;
        font-style: italic;
        font-size: 20px;
      }

      /* ── Action bar ─────────────────────────────────── */
      .action-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        padding-top: 18px;
        border-top: 1px solid var(--rule);
      }
      .secondary-actions {
        display: flex;
        gap: 4px;
      }

      .btn,
      .btn-primary {
        font-family: "DM Sans", sans-serif;
        cursor: pointer;
        border-radius: 6px;
        transition:
          background 0.15s ease,
          color 0.15s ease,
          border-color 0.15s ease,
          transform 0.08s ease,
          box-shadow 0.08s ease;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 14px;
        font-size: 13px;
        font-weight: 500;
        border: 1px solid var(--rule);
        background: var(--paper);
        color: var(--ink-2);
        letter-spacing: -0.005em;
      }
      .btn:hover {
        color: var(--ink);
        background: var(--paper-2);
        border-color: var(--ink-3);
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
      .btn svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
        stroke-width: 1.8;
      }

      .btn-ghost {
        border-color: transparent;
        background: transparent;
        color: var(--ink-3);
      }
      .btn-ghost:hover {
        background: var(--paper-2);
        border-color: var(--rule);
        color: var(--ink);
      }

      .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 11px 16px 11px 20px;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: -0.005em;
        background: var(--ink);
        color: var(--paper);
        border: 1px solid var(--ink);
        position: relative;
        overflow: hidden;
        box-shadow: var(--shadow-press);
      }
      .btn-primary:hover:not(:disabled) {
        background: var(--accent);
        border-color: var(--accent);
      }
      .btn-primary:active:not(:disabled) {
        transform: translateY(1px);
        box-shadow: 0 0 0 rgba(0, 0, 0, 0);
      }
      .btn-primary:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }
      .btn-primary:disabled {
        opacity: 0.75;
        cursor: progress;
      }
      .btn-primary svg {
        width: 15px;
        height: 15px;
        stroke-width: 2;
      }

      .btn-shortcut {
        font-family: "JetBrains Mono", monospace;
        font-size: 10.5px;
        font-weight: 500;
        opacity: 0.55;
        padding: 2px 6px;
        border: 1px solid currentColor;
        border-radius: 3.5px;
        letter-spacing: 0;
        line-height: 1;
      }

      .btn-primary .progress-bar {
        position: absolute;
        left: 0;
        bottom: 0;
        height: 2px;
        width: 100%;
        background: var(--accent);
        transform-origin: left;
        transform: scaleX(0);
        display: none;
      }
      .btn-primary.is-loading {
        background: var(--accent-2);
        border-color: var(--accent-2);
      }
      .btn-primary.is-loading .progress-bar {
        display: block;
        background: linear-gradient(
          90deg,
          transparent,
          var(--paper) 40%,
          var(--paper) 60%,
          transparent
        );
        animation: progress 1.4s ease-in-out infinite;
      }
      @keyframes progress {
        0% {
          transform: translateX(-100%) scaleX(0.5);
        }
        100% {
          transform: translateX(200%) scaleX(0.5);
        }
      }

      /* ── Toast ──────────────────────────────────────── */
      .toast-container {
        position: fixed;
        bottom: 26px;
        right: 26px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 1000;
        pointer-events: none;
      }
      .toast {
        position: relative;
        pointer-events: auto;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 16px 11px 18px;
        background: var(--paper);
        color: var(--ink);
        border: 1px solid var(--rule);
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        box-shadow:
          0 4px 14px rgba(40, 30, 20, 0.1),
          0 12px 36px rgba(40, 30, 20, 0.08);
        max-width: 360px;
        transform: translateY(8px);
        opacity: 0;
        transition:
          transform 0.22s ease,
          opacity 0.22s ease;
        overflow: hidden;
      }
      .toast.is-visible {
        transform: translateY(0);
        opacity: 1;
      }
      .toast .toast-bar {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
      }
      .toast .toast-icon {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        stroke-width: 2.2;
      }
      .toast.success .toast-icon,
      .toast.success .toast-bar {
        color: var(--success);
        background: var(--success);
      }
      .toast.error .toast-icon,
      .toast.error .toast-bar {
        color: var(--error);
        background: var(--error);
      }
      .toast.info .toast-icon,
      .toast.info .toast-bar {
        color: var(--accent);
        background: var(--accent);
      }
      .toast.success .toast-bar,
      .toast.error .toast-bar,
      .toast.info .toast-bar {
        color: transparent;
      }

      /* ── Responsive ─────────────────────────────────── */
      @media (max-width: 920px) {
        .app {
          padding: 20px 18px 18px;
          gap: 14px;
        }
        .workspace {
          grid-template-columns: 1fr;
          min-height: 420px;
        }
        .workspace[data-view="split"] .preview-pane {
          display: none;
        }
        .toolbar {
          gap: 16px;
        }
        .control.toolbar-end {
          margin-left: 0;
          width: 100%;
        }
        .brand-name {
          font-size: 24px;
        }
        .action-bar {
          flex-direction: column-reverse;
          align-items: stretch;
        }
        .secondary-actions {
          justify-content: space-between;
        }
        .btn-primary {
          justify-content: center;
        }
      }

      @media (max-width: 540px) {
        .app {
          padding: 16px 12px 14px;
        }
        .brand-name {
          font-size: 21px;
        }
        .header-meta {
          display: none;
        }
        .segmented button {
          padding: 6px 10px;
          font-size: 12px;
        }
        .pane-header {
          padding: 10px 14px;
        }
        #markdown {
          padding: 18px 18px;
          font-size: 14px;
        }
        .preview-content {
          padding: 22px 22px 28px;
        }
      }

      /* Hidden native file input */
      #fileInput {
        position: absolute;
        opacity: 0;
        pointer-events: none;
        width: 0;
        height: 0;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div class="brand">
          <svg
            class="brand-mark"
            viewBox="0 0 28 32"
            fill="none"
            aria-hidden="true"
          >
            <path
              d="M3 2 H19 L25 8 V30 H3 Z"
              stroke="currentColor"

      <section class="toolbar" aria-label="Document options">
        <div class="control">

        <div class="control">
          <span class="control-label" id="lbl-orient">Orientation</span>
          <div
            class="segmented"
            data-group="orientation"
            role="group"

            <button type="button" data-value="portrait" class="is-active">

        <div class="control toolbar-end">
          <span class="control-label" id="lbl-view">View</span>

            <span class="pane-stats" aria-live="polite">
              <span><span id="wordCount">0</span> words</span>
              <span class="stat-dot" aria-hidden="true"></span>
              <span><span id="charCount">0</span> chars</span>
            </span>
          </div>
          <div class="editor-body">
            <textarea
              id="markdown"
              name="markdown"
              spellcheck="false"

            ></textarea>

            <div class="empty-state" id="emptyState">
              <svg
                class="empty-state-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                aria-hidden="true"
              >
                <path d="M5 4 L15 4 L19 8 L19 20 L5 20 Z" stroke-linejoin="round" />
                <path d="M15 4 L15 8 L19 8" stroke-linejoin="round" />
                <line x1="8" y1="12" x2="16" y2="12" stroke-linecap="round" />

                <button type="button" class="btn" id="uploadBtn">

            id="preview"
            aria-live="polite"

      <footer class="action-bar">
        <div class="secondary-actions">

              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            Upload
          </button>
          <button type="button" class="btn btn-ghost" id="sampleBtn2">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path
                d="M12 3 L14 9 L20 11 L14 13 L12 19 L10 13 L4 11 L10 9 Z"
                stroke-linejoin="round"
              />
            </svg>
            Sample
          </button>
          <button type="button" class="btn btn-ghost" id="metadataBtn">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z" />
              <polyline points="14 3 14 9 20 9" />
              <line x1="8" y1="13" x2="16" y2="13" />
              <line x1="8" y1="17" x2="13" y2="17" />
            </svg>
            Insert metadata
          </button>
          <button type="button" class="btn btn-ghost" id="clearBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
            Clear
          </button>
        </div>

        <button type="button" class="btn-primary" id="convertBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          <span class="btn-primary-label">Convert to PDF</span>
          <span class="btn-shortcut" id="shortcutHint">⌘↵</span>
          <span class="progress-bar" aria-hidden="true"></span>
        </button>
      </footer>
    </div>

    <div class="toast-container" id="toastContainer" aria-live="polite"></div>
    <input
      type="file"
      id="fileInput"
      accept=".md,.markdown,text/markdown,text/plain"
    />

    <script>
      // ── marked configuration ────────────────────────
      if (window.marked && marked.setOptions) {
        marked.setOptions({
          gfm: true,
          breaks: false,
          mangle: false,
          headerIds: false,
        });
      }

      // ── state ──────────────────────────────────────
      const state = {
        view: "split",
        pageSize: "a4",
        orientation: "portrait",
      };

      // ── elements ───────────────────────────────────
      const markdownEl = document.getElementById("markdown");
      const previewEl = document.getElementById("preview");
      const wordCountEl = document.getElementById("wordCount");
      const charCountEl = document.getElementById("charCount");
      const emptyStateEl = document.getElementById("emptyState");
      const editorPaneEl = document.getElementById("editorPane");
      const convertBtn = document.getElementById("convertBtn");
      const clearBtn = document.getElementById("clearBtn");
      const uploadBtn = document.getElementById("uploadBtn");
      const uploadBtn2 = document.getElementById("uploadBtn2");
      const sampleBtn = document.getElementById("sampleBtn");
      const sampleBtn2 = document.getElementById("sampleBtn2");
      const fileInput = document.getElementById("fileInput");
      const workspace = document.querySelector(".workspace");
      const toastContainer = document.getElementById("toastContainer");
      const shortcutHint = document.getElementById("shortcutHint");

      const isMac = /Mac|iPhone|iPad/.test(navigator.platform);
      shortcutHint.textContent = isMac ? "⌘↵" : "Ctrl ↵";

      // ── sample content ─────────────────────────────
      const SAMPLE_CONTENT =
        `---
title: "Sample Document"
author: "Pandoc Web"
date: "` +
        new Date().toLocaleDateString() +
        `"
colorlinks: true
---

# Sample Document

This is a sample markdown document to demonstrate the conversion.

## Features

- **Bold text**
- *Italic text*
- [Links](https://example.com)
- Code: \`console.log("Hello")\`

## Code Block

\`\`\`javascript
function greet(name) {
    return \`Hello, \${name}!\`;
}
\`\`\`

## List

1. First item
2. Second item
3. Third item

> This is a blockquote example.`;

      // ── toast ──────────────────────────────────────
      function toast(message, type = "info", duration = 3200) {
        const el = document.createElement("div");
        el.className = `toast ${type}`;
        const iconPaths = {
          success: '<polyline points="20 6 9 17 4 12"/>',
          error:
            '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>',
          info: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="13"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
        };
        el.innerHTML = `
          <span class="toast-bar"></span>
          <svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">${iconPaths[type] || iconPaths.info}</svg>
          <span>${message}</span>
        `;
        toastContainer.appendChild(el);
        requestAnimationFrame(() => el.classList.add("is-visible"));
        const timer = setTimeout(() => dismiss(), duration);
        function dismiss() {
          clearTimeout(timer);
          el.classList.remove("is-visible");
          setTimeout(() => el.remove(), 240);
        }
        return { el, dismiss };
      }

      // ── counts + empty state ───────────────────────
      function updateCounts() {
        const text = markdownEl.value;
        charCountEl.textContent = text.length.toLocaleString();
        const words = text.trim() === "" ? 0 : text.trim().split(/\s+/).length;
        wordCountEl.textContent = words.toLocaleString();
        emptyStateEl.classList.toggle("is-hidden", text.length > 0);
      }

      // ── preview render (debounced) ─────────────────
      let renderTimer;
      function renderPreview() {
        clearTimeout(renderTimer);
        renderTimer = setTimeout(() => {
          const md = markdownEl.value;
          if (!md.trim()) {
            previewEl.innerHTML =
              '<div class="preview-empty">A preview will appear here.</div>';
            return;
          }
          try {
            const cleaned = md.replace(/^---[\s\S]*?\n---\n?/, "");
            previewEl.innerHTML =
              window.marked && marked.parse
                ? marked.parse(cleaned)
                : `<pre>${escapeHtml(cleaned)}</pre>`;
          } catch (err) {
            previewEl.innerHTML = `<div class="preview-empty">Could not render preview.</div>`;
          }
        }, 130);
      }

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      // ── segmented controls ─────────────────────────
      document.querySelectorAll(".segmented").forEach((group) => {
        const name = group.dataset.group;
        group.addEventListener("click", (e) => {
          const btn = e.target.closest("button");
          if (!btn || btn.classList.contains("is-active")) return;
          const val = btn.dataset.value;
          group
            .querySelectorAll("button")
            .forEach((b) => b.classList.toggle("is-active", b === btn));
          state[name] = val;
          if (name === "view") {
            workspace.dataset.view = val;
          }
        });
      });

      // ── editor input ───────────────────────────────
      markdownEl.addEventListener("input", () => {
        updateCounts();
        renderPreview();
      });

      // ── sample buttons ─────────────────────────────
      function loadSample() {
        markdownEl.value = SAMPLE_CONTENT;
        updateCounts();
        renderPreview();
        toast("Sample loaded", "success", 2200);
      }
      sampleBtn.addEventListener("click", loadSample);
      sampleBtn2.addEventListener("click", loadSample);

      // ── insert PDF metadata ────────────────────────
      const metadataBtn = document.getElementById("metadataBtn");
      function formatDDMMYYYY(d) {
        const dd = String(d.getDate()).padStart(2, "0");
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const yyyy = d.getFullYear();
        return `${dd}/${mm}/${yyyy}`;
      }
      metadataBtn.addEventListener("click", () => {
        const block =
          `---\n` +
          `title: "Sample Document"\n` +
          `author: "Pandoc Web"\n` +
          `date: "${formatDDMMYYYY(new Date())}"\n` +
          `colorlinks: true\n` +
          `---\n\n`;

        const current = markdownEl.value;
        const frontmatterRe = /^---\r?\n[\s\S]*?\r?\n---\r?\n?/;

        if (frontmatterRe.test(current)) {
          markdownEl.value = current.replace(frontmatterRe, block);
          toast("Metadata block updated", "success", 2200);
        } else {
          markdownEl.value = block + current;
          toast("Metadata block inserted", "success", 2200);
        }
        updateCounts();
        renderPreview();
        markdownEl.focus();
        markdownEl.setSelectionRange(0, 0);
        markdownEl.scrollTop = 0;
      });

      // ── clear ──────────────────────────────────────
      clearBtn.addEventListener("click", () => {
        if (markdownEl.value.length === 0) return;
        markdownEl.value = "";
        updateCounts();
        renderPreview();
        markdownEl.focus();
        toast("Editor cleared", "info", 1600);
      });

      // ── upload + file input ────────────────────────
      function triggerUpload() {
        fileInput.click();
      }
      uploadBtn.addEventListener("click", triggerUpload);
      uploadBtn2.addEventListener("click", triggerUpload);

      fileInput.addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        await loadFile(file);
        fileInput.value = "";
      });

      async function loadFile(file) {
        try {
          const text = await file.text();
          markdownEl.value = text;
          updateCounts();
          renderPreview();
          toast(`Loaded "${file.name}"`, "success", 2600);
        } catch (err) {
          toast(`Could not read file: ${err.message}`, "error", 4000);
        }
      }

      // ── drag & drop ────────────────────────────────
      editorPaneEl.addEventListener("dragover", (e) => {
        e.preventDefault();
        e.stopPropagation();
        editorPaneEl.classList.add("is-drag-over");
      });
      editorPaneEl.addEventListener("dragleave", (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (!editorPaneEl.contains(e.relatedTarget)) {
          editorPaneEl.classList.remove("is-drag-over");
        }
      });
      editorPaneEl.addEventListener("drop", async (e) => {
        e.preventDefault();
        e.stopPropagation();
        editorPaneEl.classList.remove("is-drag-over");

        const files = Array.from(e.dataTransfer.files);
        const mdFiles = files.filter(
          (f) =>
            f.type === "text/markdown" ||
            f.name.toLowerCase().endsWith(".md") ||
            f.name.toLowerCase().endsWith(".markdown") ||
            f.type === "text/plain",
        );
        if (mdFiles.length === 0) {
          toast("Drop a markdown (.md) file", "error", 3000);
          return;
        }
        if (mdFiles.length > 1) {
          toast("Drop one file at a time", "error", 3000);
          return;
        }
        await loadFile(mdFiles[0]);
      });

      // ── paste detection ────────────────────────────
      markdownEl.addEventListener("paste", async (e) => {
        const cd = e.clipboardData || window.clipboardData;
        const files = Array.from(cd.files || []);

        if (files.length > 0) {
          const mdFiles = files.filter(
            (f) =>
              f.type === "text/markdown" ||
              f.name.toLowerCase().endsWith(".md") ||
              f.name.toLowerCase().endsWith(".markdown") ||
              f.type === "text/plain",
          );
          if (mdFiles.length > 0) {
            e.preventDefault();
            await loadFile(mdFiles[0]);
            return;
          }
        }

        const text = cd.getData("text");
        if (text && isLikelyMarkdown(text)) {
          setTimeout(() => toast("Markdown detected", "info", 1800), 0);
        }
      });

      function isLikelyMarkdown(text) {
        const indicators = [
          /^#{1,6}\s/m,
          /^\*\s/m,
          /^-\s/m,
          /^\d+\.\s/m,
          /\*\*[^*]+\*\*/,
          /\[[^\]]+\]\([^)]+\)/,
          /```/,
          /`[^`]+`/,
          /^\>/m,
          /^---\s*$/m,
        ];
        return indicators.some((re) => re.test(text));
      }

      // ── convert ────────────────────────────────────
      let activeLoadingToast = null;
      async function convert() {
        if (convertBtn.disabled) return;
        const markdown = markdownEl.value.trim();
        if (!markdown) {
          toast("Add some markdown first", "error", 2400);
          markdownEl.focus();
          return;
        }

        convertBtn.disabled = true;
        convertBtn.classList.add("is-loading");
        const labelEl = convertBtn.querySelector(".btn-primary-label");
        const originalLabel = labelEl.textContent;
        labelEl.textContent = "Typesetting…";

        if (activeLoadingToast) activeLoadingToast.dismiss();
        activeLoadingToast = toast(
          "Converting markdown to PDF…",
          "info",
          60000,
        );

        try {
          const response = await fetch("/convert", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              markdown,
              orientation: state.orientation,
              pageSize: state.pageSize,
            }),
          });

          if (response.ok) {
            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.style.display = "none";
            a.href = url;
            const ts = Math.floor(Date.now() / 1000);
            a.download = `markdown${ts}.pdf`;
            document.body.appendChild(a);
            a.click();
            URL.revokeObjectURL(url);
            a.remove();

            activeLoadingToast.dismiss();
            activeLoadingToast = null;
            toast("PDF ready — download started", "success", 3000);
          } else {
            const errorText = await response.text();
            activeLoadingToast.dismiss();
            activeLoadingToast = null;
            toast(
              `Conversion failed: ${(errorText || "").slice(0, 160)}`,
              "error",
              5000,
            );
          }
        } catch (err) {
          if (activeLoadingToast) {
            activeLoadingToast.dismiss();
            activeLoadingToast = null;
          }
          toast(`Error: ${err.message}`, "error", 5000);
        } finally {
          convertBtn.disabled = false;
          convertBtn.classList.remove("is-loading");
          labelEl.textContent = originalLabel;
        }
      }
      convertBtn.addEventListener("click", convert);

      // ── keyboard shortcut: Cmd/Ctrl+Enter ──────────
      document.addEventListener("keydown", (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
          e.preventDefault();
          convert();
        }
      });

      // ── theme toggle ───────────────────────────────
      const themeToggle = document.getElementById("themeToggle");
      const darkMediaQuery = window.matchMedia("(prefers-color-scheme: dark)");

      function applyTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        themeToggle.setAttribute(
          "aria-label",
          theme === "dark" ? "Switch to light theme" : "Switch to dark theme",
        );
        themeToggle.setAttribute(
          "title",
          theme === "dark" ? "Switch to light theme" : "Switch to dark theme",
        );
      }

      themeToggle.addEventListener("click", () => {
        const current = document.documentElement.getAttribute("data-theme");
        const next = current === "dark" ? "light" : "dark";
        try {
          localStorage.setItem("pw-theme", next);
        } catch (e) {}
        applyTheme(next);
      });

      darkMediaQuery.addEventListener("change", (e) => {
        let saved = null;
        try {
          saved = localStorage.getItem("pw-theme");
        } catch (err) {}
        if (!saved) applyTheme(e.matches ? "dark" : "light");
      });

      // Sync label on load
      applyTheme(document.documentElement.getAttribute("data-theme") || "light");

      // ── init ───────────────────────────────────────
      updateCounts();
      renderPreview();
    </script>
  </body>
</html>
